---
driver:
  name: docker

platforms:
  - name: tumbleweed
    image: registry.opensuse.org/opensuse/tumbleweed:latest
    pre_build_image: true

provisioner:
  name: ansible
  env:
    ANSIBLE_ROLES_PATH: ../../../../roles

verifier:
  name: ansible

scenario:
  test_sequence:
    - destroy
    - syntax
    - create
    - prepare
    - converge
    - idempotence
    - verify
    - destroy
